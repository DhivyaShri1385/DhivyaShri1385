name: Update Recent Projects

on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight (UTC)
  workflow_dispatch:        # allows manual run from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate recent projects list
        env:
          USER: YOUR_USERNAME            # <-- replace
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/$USER/repos?sort=updated&per_page=10&type=owner")

          LIST=$(echo "$DATA" | python3 -c "
          import sys, json
          repos = json.load(sys.stdin)
          out = []
          for r in repos:
              if r.get('fork'): continue
              desc = r['description'] or 'No description'
              out.append(f\"- [{r['name']}]({r['html_url']}) — {desc}\")
              if len(out) == 5: break
          print('\n'.join(out))
          ")

          export LIST
          python3 - <<'EOF'
          import os, re
          new = os.environ['LIST']
          with open('README.md', encoding='utf-8') as f:
              c = f.read()
          c = re.sub(
              r'(<!-- RECENT_PROJECTS:START -->).*?(<!-- RECENT_PROJECTS:END -->)',
              lambda m: f"{m.group(1)}\n{new}\n{m.group(2)}",
              c, flags=re.S)
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(c)
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update recent projects"
          git push
